<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>AIIP Legal Assistant</title>
</head>
<body>

<h2>AIIP Legal Assistant</h2>

<input type="file" id="file" />
<br><br>

<button id="analyzeBtn">Анализирай</button>

<br><br>

<textarea id="output" style="width:100%; height:300px;"></textarea>

<!-- 🔥 БИБЛИОТЕКИ (ЗАДЪЛЖИТЕЛНО ПРЕДИ SCRIPT) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const output = document.getElementById("output");
  const btn = document.getElementById("analyzeBtn");
  const fileInput = document.getElementById("file");

  function show(msg) {
    output.value = msg;
  }

  btn.addEventListener("click", async function () {

    try {
      if (!fileInput.files.length) {
        show("❌ Моля качете файл");
        return;
      }

      const file = fileInput.files[0];
      const name = file.name.toLowerCase();

      let text = "";

      // ✅ TXT
      if (name.endsWith(".txt")) {
        text = await file.text();
      }

      // ✅ DOCX
      else if (name.endsWith(".docx")) {
        const buffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buffer });
        text = result.value;
      }

      // ✅ PDF (без OCR за стабилност)
      else if (name.endsWith(".pdf")) {

        if (typeof pdfjsLib === "undefined") {
          throw new Error("pdf.js не е зареден");
        }

        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(i => i.str).join(" ") + "\n";
        }
      }

      else {
        show("❌ Неподдържан файл");
        return;
      }

      if (!text || text.length < 10) {
        show("❌ Няма текст");
        return;
      }

      show("🧠 Анализиране...");

      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      show(data.result || JSON.stringify(data, null, 2));

    } catch (err) {
      console.error(err);
      show("❌ " + err.message);
    }

  });

  show("✅ Готово");

});
</script>

</body>
</html>
