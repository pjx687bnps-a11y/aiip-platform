<!DOCTYPE html>
<html>
<head>
  <title>AIIP Legal Assistant</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      height: 200px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>⚖️ AIIP Legal Assistant</h1>

<button onclick="analyze()">Анализирай (тест)</button>

<h3>📊 Резултат:</h3>
<textarea id="output"></textarea>

<script>
async function analyze() {
  const output = document.getElementById("output");

  output.value = "⏳ Анализира се...";

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: "The prosecutor refused to open a case due to lack of evidence. The reasoning appears incomplete and may contain legal errors."
      })
    });

    const text = await res.text();

try {
  const data = JSON.parse(text);
  output.value = data.result || "❌ " + data.error;
} catch {
  output.value = "❌ Server error:\n" + text;
}

    output.value = data.result || JSON.stringify(data);
  } catch (err) {
    output.value = "❌ Грешка: " + err.message;
  }
}
</script>

</body>
</html>
