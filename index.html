// 📄 PDF extractor (истински)
async function extractTextFromPDF(file) {
  const loadingTask = pdfjsLib.getDocument({
    data: await file.arrayBuffer()
  });

  const pdf = await loadingTask.promise;

  let text = "";

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    const strings = content.items.map(item => item.str).join(" ");

    text += strings + "\n";
  }

  // 👉 ако няма текст → OCR
  if (text.trim().length < 20) {
    console.log("OCR START");

    const worker = await Tesseract.createWorker("bul+eng");

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: context,
        viewport
      }).promise;

      const result = await worker.recognize(canvas);

      text += result.data.text + "\n";
    }

    await worker.terminate();
  }

  return text.trim();
}
  const loadingTask = pdfjsLib.getDocument({

  const pdf = await loadingTask.promise;

}

// 📄 Word extractor (PRO)
async function extractTextFromWord(file) {
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer });
  return result.value;
}

async function analyze() {
  const output = document.getElementById("output");
  const fileInput = document.getElementById("file");

  output.value = "⏳ Анализира се...";

  try {
    let text = "";

    if (fileInput.files.length === 0) {
      output.value = "❌ Моля качете PDF или Word документ.";
      return;
    }

    const file = fileInput.files[0];

    // 🔍 Разпознаване на тип файл
    if (file.type === "application/pdf") {
      text = await extractTextFromPDF(file);
    } 
    else if (file.name.endsWith(".docx")) {
      text = await extractTextFromWord(file);
    } 
    else {
      output.value = "❌ Поддържат се само PDF и DOCX файлове.";
      return;
    }

    // 🧠 защита
   if (!text || text.trim().length < 10)
      output.value = "❌ Неуспешно извличане на текст от документа.";

    }

    const res = await fetch("/api/analyze", {
      method: "POST",

    });

  }
}
