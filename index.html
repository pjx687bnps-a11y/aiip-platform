<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

document.getElementById("analyzeBtn").addEventListener("click", analyze);

async function extractTextFromPDF(file) {
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

  let text = "";

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(i => i.str).join(" ") + "\n";
  }

  if (text.trim().length < 20) {
    const worker = await Tesseract.createWorker("bul+eng");

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({ canvasContext: ctx, viewport }).promise;

      const result = await worker.recognize(canvas);
      text += result.data.text + "\n";
    }

    await worker.terminate();
  }

  return text.trim();
}

async function extractTextFromWord(file) {
  const buffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buffer });
  return result.value.trim();
}

async function extractTextFromTxt(file) {
  return (await file.text()).trim();
}

async function analyze() {
  const output = document.getElementById("output");
  const fileInput = document.getElementById("file");

  output.value = "⏳ Анализира се...";

  if (!fileInput.files.length) {
    output.value = "❌ Качи файл";
    return;
  }

  const file = fileInput.files[0];
  const name = file.name.toLowerCase();

  let text = "";

  try {
    if (name.endsWith(".pdf")) {
      text = await extractTextFromPDF(file);
    } else if (name.endsWith(".docx")) {
      text = await extractTextFromWord(file);
    } else if (name.endsWith(".txt")) {
      text = await extractTextFromTxt(file);
    } else {
      output.value = "❌ Само PDF, DOCX, TXT";
      return;
    }

    if (!text) {
      output.value = "❌ Няма текст в документа";
      return;
    }

    // ТЕСТ: показва текста (ако искаш анализ, махни return)
    output.value = text;
    return;

    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const raw = await res.text();

    try {
      const data = JSON.parse(raw);
      output.value = data.result || "❌ Няма резултат";
    } catch {
      output.value = raw;
    }

  } catch (err) {
    output.value = "❌ " + err.message;
  }
}
</script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

document.getElementById("analyzeBtn").addEventListener("click", analyze);

async function extractTextFromPDF(file) {
  let text = "";

  try {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    console.log("PDF pages:", pdf.numPages);

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();

      const pageText = content.items
        .map(item => item.str)
        .join(" ")
        .trim();

      text += pageText + "\n";
    }

    console.log("PDF extracted length:", text.trim().length);

    // fallback OCR if parsed text is too short
    if (text.trim().length < 30) {
      console.log("Starting OCR fallback...");

      const worker = await Tesseract.createWorker("bul+eng");

      let ocrText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
          canvasContext: ctx,
          viewport
        }).promise;

        const result = await worker.recognize(canvas);
        ocrText += result.data.text + "\n";
      }

      await worker.terminate();

      if (ocrText.trim().length > text.trim().length) {
        text = ocrText;
      }

      console.log("OCR extracted length:", text.trim().length);
    }

    return text.trim();
  } catch (err) {
    console.error("PDF extraction error:", err);
    throw new Error("Грешка при четене на PDF: " + err.message);
  }
}

async function extractTextFromWord(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });

    console.log("DOCX extracted length:", (result.value || "").trim().length);
    console.log("DOCX messages:", result.messages);

    return (result.value || "").trim();
  } catch (err) {
    console.error("DOCX extraction error:", err);
    throw new Error("Грешка при четене на DOCX: " + err.message);
  }
}

async function extractTextFromTxt(file) {
  try {
    const text = await file.text();
    console.log("TXT extracted length:", text.trim().length);
    return text.trim();
  } catch (err) {
    console.error("TXT extraction error:", err);
    throw new Error("Грешка при четене на TXT: " + err.message);
  }
}

async function analyze() {
  const output = document.getElementById("output");
  const fileInput = document.getElementById("file");

  output.value = "⏳ Анализира се...";

  try {
    if (!fileInput.files || fileInput.files.length === 0) {
      output.value = "❌ Моля качете файл.";
      return;
    }

    const file = fileInput.files[0];
    const fileName = file.name.toLowerCase();
    let text = "";

    console.log("File name:", file.name);
    console.log("File type:", file.type);
    console.log("File size:", file.size);

    if (file.type === "application/pdf" || fileName.endsWith(".pdf")) {
      text = await extractTextFromPDF(file);
    } else if (
      file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document" ||
      fileName.endsWith(".docx")
    ) {
      text = await extractTextFromWord(file);
    } else if (file.type === "text/plain" || fileName.endsWith(".txt")) {
      text = await extractTextFromTxt(file);
    } else {
      output.value = "❌ Поддържат се PDF, DOCX и TXT файлове.";
      return;
    }

    if (!text || text.trim().length < 5) {
      output.value =
        "❌ Не можа да се извлече текст.\n\n" +
        "Провери дали:\n" +
        "- PDF файлът не е само снимка\n" +
        "- DOCX файлът не е повреден\n" +
        "- файлът съдържа реален текст\n\n" +
        "Отвори Developer Console (F12) и виж логовете.";
      return;
    }

    console.log("FINAL EXTRACTED TEXT:", text);

    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text,
        fileName: file.name
      })
    });

    const rawResponse = await res.text();

    let data;
    try {
      data = JSON.parse(rawResponse);
    } catch {
      output.value = "❌ Сървърът не върна JSON:\n\n" + rawResponse;
      return;
    }

    if (!res.ok) {
      output.value = "❌ " + (data.error || "Грешка от сървъра.");
      return;
    }

    output.value = data.result || data.analysis || "✅ Текстът е извлечен, но няма върнат анализ.";
  } catch (err) {
    console.error("ANALYZE ERROR:", err);
    output.value = "❌ Грешка: " + err.message;
  }
}
</script>
