<!DOCTYPE html>
<html>
<head>
  <title>⚖️ AIIP Legal Assistant</title>
</head>
<body>

<h1>⚖️ AIIP Legal Assistant</h1>

<input type="file" id="file" />
<br><br>

<button id="analyzeBtn">Анализирай</button>

<h3>📊 Резултат:</h3>
<textarea id="output" style="width:100%; height:400px;"></textarea>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Mammoth (Word parser) -->
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>
document.getElementById("analyzeBtn").addEventListener("click", analyze);

// 📄 PDF extractor (истински)
async function extractTextFromPDF(file) {
  const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
  let text = "";

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(" ") + "\n";
  }

  return text;
}

// 📄 Word extractor (PRO)
async function extractTextFromWord(file) {
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer });
  return result.value;
}

async function analyze() {
  const output = document.getElementById("output");
  const fileInput = document.getElementById("file");

  output.value = "⏳ Анализира се...";

  try {
    let text = "";

    if (fileInput.files.length === 0) {
      output.value = "❌ Моля качете PDF или Word документ.";
      return;
    }

    const file = fileInput.files[0];

    // 🔍 Разпознаване на тип файл
    if (file.type === "application/pdf") {
      text = await extractTextFromPDF(file);
    } 
    else if (file.name.endsWith(".docx")) {
      text = await extractTextFromWord(file);
    } 
    else {
      output.value = "❌ Поддържат се само PDF и DOCX файлове.";
      return;
    }

    // 🧠 защита
    if (!text || text.length < 30) {
      output.value = "❌ Неуспешно извличане на текст от документа.";
      return;
    }

    console.log("EXTRACTED TEXT:", text);

    // 📡 изпращане към backend
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    output.value = data.result || "❌ " + data.error;

  } catch (err) {
    console.error(err);
    output.value = "❌ Грешка: " + err.message;
  }
}
</script>

</body>
</html>
