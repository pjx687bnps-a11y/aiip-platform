<script>
(function () {

  if (!window.pdfjsLib) {
    alert("❌ pdf.js не е зареден");
    return;
  }

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";

  const output = document.getElementById("output");
  const btn = document.getElementById("analyzeBtn");

  let isRunning = false;

  function show(msg) {
    output.value = msg;
  }

  // ✅ ПО-ДОБЪР GARBAGE DETECTOR
  function isGarbage(text) {
    if (!text) return true;

    const cyrillic = (text.match(/[А-Яа-я]/g) || []).length;
    const latin = (text.match(/[A-Za-z]/g) || []).length;

    if (latin > cyrillic) return true;

    const caps = (text.match(/[A-Z]{3,}/g) || []).length;
    if (caps > 20) return true;

    return false;
  }

  // =====================
  // PDF
  // =====================
  async function extractTextFromPDF(file) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(i => i.str || "").join(" ") + "\n";
    }

    if (text.trim().length > 100) {
      return text.trim();
    }

    console.log("⚠️ OCR fallback...");

    const worker = await Tesseract.createWorker();

    await worker.loadLanguage("bul");
    await worker.initialize("bul");

    let ocrText = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      ctx.filter = "grayscale(100%) contrast(200%)";

      await page.render({ canvasContext: ctx, viewport }).promise;

      const result = await worker.recognize(canvas);
      ocrText += (result?.data?.text || "") + "\n";
    }

    await worker.terminate();

    console.log("OCR OUTPUT:", ocrText.slice(0, 300));

    if (isGarbage(ocrText)) {
      throw new Error("OCR резултатът е нечетим");
    }

    return ocrText.trim();
  }

  // =====================
  // WORD
  // =====================
  async function extractTextFromWord(file) {
    const buffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: buffer });
    return result.value.trim();
  }

  // =====================
  // TXT
  // =====================
  async function extractTextFromTxt(file) {
    return (await file.text()).trim();
  }

  // =====================
  // MAIN
  // =====================
  async function runNewAnalyze(e) {

    if (isRunning) return;

    isRunning = true;
    btn.disabled = true;

    if (e) e.preventDefault();

    show("🟢 Обработка...");

    try {
      const fileInput = document.getElementById("file");

      if (!fileInput.files.length) {
        show("❌ Моля качете файл.");
        return;
      }

      const file = fileInput.files[0];
      const name = file.name.toLowerCase();

      let text = "";

      if (name.endsWith(".pdf")) {
        text = await extractTextFromPDF(file);
      } else if (name.endsWith(".docx")) {
        text = await extractTextFromWord(file);
      } else if (name.endsWith(".txt")) {
        text = await extractTextFromTxt(file);
      } else {
        show("❌ Поддържат се само PDF, DOCX и TXT.");
        return;
      }

      // ✅ FINAL VALIDATION
      if (!text || text.length < 50 || isGarbage(text)) {
        show("❌ Текстът е нечетим или лошо разпознат.");
        return;
      }

      // =====================
      // 🔥 CALL API (НОВО)
      // =====================
      show("🧠 Анализиране...");

      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "API error");
      }

      // ✅ ПОКАЗВАШ И ANALYSIS + EXTRACTED
      show(
        "=== АНАЛИЗ ===\n\n" +
        data.result +
        "\n\n=== ИЗВЛЕЧЕНИ ДАННИ ===\n\n" +
        JSON.stringify(data.extracted, null, 2)
      );

    } catch (err) {
      console.error(err);
      show("❌ Грешка: " + err.message);
    } finally {
      isRunning = false;
      btn.disabled = false;
    }
  }

  btn.onclick = runNewAnalyze;

  show("✅ Готово. Качи файл и натисни „Анализирай“.");

})();
</script>
