<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>⚖️ AIIP Legal Assistant</title>
</head>
<body>

<h1>⚖️ AIIP Legal Assistant</h1>

<input type="file" id="file" accept=".pdf,.docx,.txt" />
<br><br>

<button id="analyzeBtn" type="button">Анализирай</button>

<h3>📊 Резултат:</h3>
<textarea id="output" style="width:100%; height:400px;"></textarea>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>
(function () {
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }

  const output = document.getElementById("output");

  function show(msg) {
    output.value = msg;
  }

  // блокира стария /api/analyze ако някъде още се вика
  const originalFetch = window.fetch ? window.fetch.bind(window) : null;
  window.fetch = async function (url, options) {
    try {
      if (typeof url === "string" && url.includes("/api/analyze")) {
        return new Response(
          JSON.stringify({ result: "⚠️ Старият /api/analyze беше блокиран от новия код." }),
          {
            status: 200,
            headers: { "Content-Type": "application/json" }
          }
        );
      }
    } catch (e) {}
    if (originalFetch) return originalFetch(url, options);
    throw new Error("fetch is not available");
  };

  async function extractTextFromPDF(file) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str || "").join(" ").trim();
      text += pageText + "\n";
    }

    if (text.trim().length < 20) {
      try {
        const worker = await Tesseract.createWorker("bul+eng");
        let ocrText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 2 });

          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");

          canvas.width = Math.ceil(viewport.width);
          canvas.height = Math.ceil(viewport.height);

          await page.render({
            canvasContext: ctx,
            viewport: viewport
          }).promise;

          const result = await worker.recognize(canvas);
          ocrText += ((result && result.data && result.data.text) ? result.data.text : "") + "\n";
        }

        await worker.terminate();

        if (ocrText.trim().length > text.trim().length) {
          text = ocrText;
        }
      } catch (e) {
        console.error("OCR error:", e);
      }
    }

    return text.trim();
  }

  async function extractTextFromWord(file) {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
    return (result.value || "").trim();
  }

  async function extractTextFromTxt(file) {
    return (await file.text()).trim();
  }

  async function runNewAnalyze(e) {
    if (e) {
      e.preventDefault();
      e.stopPropagation();
      if (e.stopImmediatePropagation) e.stopImmediatePropagation();
    }

    const fileInput = document.getElementById("file");
    show("🟢 НОВИЯТ КОД СЕ ИЗПЪЛНЯВА...");

    try {
      if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
        show("❌ Моля качете файл.");
        return false;
      }

      const file = fileInput.files[0];
      const name = (file.name || "").toLowerCase();
      let text = "";

      if (name.endsWith(".pdf")) {
        text = await extractTextFromPDF(file);
      } else if (name.endsWith(".docx")) {
        text = await extractTextFromWord(file);
      } else if (name.endsWith(".txt")) {
        text = await extractTextFromTxt(file);
      } else {
        show("❌ Поддържат се само PDF, DOCX и TXT.");
        return false;
      }

      if (!text || !text.trim()) {
        show("❌ Няма текст в документа.");
        return false;
      }

      show(text);
      return false;
    } catch (err) {
      console.error(err);
      show("❌ Грешка: " + err.message);
      return false;
    }
  }

  // глобално override на analyze
  window.analyze = runNewAnalyze;

  // прехващане на click още на document ниво
  document.addEventListener("click", function (e) {
    const btn = e.target && e.target.closest ? e.target.closest("#analyzeBtn") : null;
    if (!btn) return;
    runNewAnalyze(e);
  }, true);

  // подменя бутона, за да махне старите listeners
  function replaceButton() {
    const oldBtn = document.getElementById("analyzeBtn");
    if (!oldBtn || !oldBtn.parentNode) return;

    const newBtn = oldBtn.cloneNode(true);
    newBtn.type = "button";
    oldBtn.parentNode.replaceChild(newBtn, oldBtn);

    newBtn.onclick = runNewAnalyze;
    newBtn.addEventListener("click", runNewAnalyze, true);
  }

  // периодично презаписва бутона, ако платформата инжектира стар код пак
  function keepOverrideAlive() {
    replaceButton();
    const btn = document.getElementById("analyzeBtn");
    if (btn) {
      btn.onclick = runNewAnalyze;
    }
  }

  keepOverrideAlive();
  setInterval(keepOverrideAlive, 1000);

  show("✅ Кодът е зареден. Качи файл и натисни „Анализирай“.");
})();
</script>

</body>
</html>
