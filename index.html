<!DOCTYPE html>
<html>
<head>
  <title>AIIP Legal Assistant</title>
</head>
<body>

<h1>⚖️ AIIP Legal Assistant</h1>

<input type="file" id="file" />
<br><br>

<button id="analyzeBtn">Анализирай</button>

<h3>📊 Резултат:</h3>
<textarea id="output" style="width:100%; height:200px;"></textarea>

<script>
document.getElementById("analyzeBtn").addEventListener("click", analyze);

async function analyze() {
  const output = document.getElementById("output");
  const fileInput = document.getElementById("file");

  console.log("CLICKED");

  output.value = "⏳ Анализира се...";

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: Прокурор Иван Иванов от Районна прокуратура София
по преписка № 123/2024 от 01.02.2024 г.
отказва да образува досъдебно производство
поради липса на доказателства...
`
      })
    });

    const data = await res.json();

    output.value = data.result || "❌ " + data.error;

  } catch (err) {
    console.error(err);
    output.value = "❌ Грешка: " + err.message;
  }
}
</script>

</body>
</html>
