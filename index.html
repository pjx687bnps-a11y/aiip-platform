<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

document.getElementById("analyzeBtn").addEventListener("click", analyze);

// PDF extractor
async function extractTextFromPDF(file) {
  const loadingTask = pdfjsLib.getDocument({
    data: await file.arrayBuffer()
  });

  const pdf = await loadingTask.promise;
  let text = "";

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const strings = content.items.map(item => item.str).join(" ");
    text += strings + "\n";
  }

  // Ако PDF е сканиран и няма текст -> OCR
  if (text.trim().length < 20) {
    const worker = await Tesseract.createWorker("bul+eng");

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: context,
        viewport
      }).promise;

      const result = await worker.recognize(canvas);
      text += result.data.text + "\n";
    }

    await worker.terminate();
  }

  return text.trim();
}

// DOCX extractor
async function extractTextFromWord(file) {
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer });
  return result.value.trim();
}

// TXT extractor
async function extractTextFromTxt(file) {
  return (await file.text()).trim();
}

async function analyze() {
  const output = document.getElementById("output");
  const fileInput = document.getElementById("file");

  output.value = "⏳ Анализира се...";

  try {
    if (!fileInput.files || fileInput.files.length === 0) {
      output.value = "❌ Моля качете файл.";
      return;
    }

    const file = fileInput.files[0];
    const fileName = file.name.toLowerCase();
    let text = "";

    // Разпознаване на файла
    if (file.type === "application/pdf" || fileName.endsWith(".pdf")) {
      text = await extractTextFromPDF(file);
    } else if (
      file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document" ||
      fileName.endsWith(".docx")
    ) {
      text = await extractTextFromWord(file);
    } else if (
      file.type === "text/plain" ||
      fileName.endsWith(".txt")
    ) {
      text = await extractTextFromTxt(file);
    } else {
      output.value = "❌ Поддържат се PDF, DOCX и TXT файлове.";
      return;
    }

    if (!text || text.trim().length < 10) {
      output.value = "❌ Неуспешно извличане на текст от документа.";
      return;
    }

    console.log("EXTRACTED TEXT:", text);

    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text, fileName: file.name })
    });

    const rawResponse = await res.text();

    let data;
    try {
      data = JSON.parse(rawResponse);
    } catch {
      output.value = "❌ Сървърът не върна JSON:\n\n" + rawResponse;
      return;
    }

    if (!res.ok) {
      output.value = "❌ " + (data.error || "Грешка от сървъра.");
      return;
    }

    output.value = data.result || data.analysis || "❌ Няма резултат от анализа.";
  } catch (err) {
    console.error(err);
    output.value = "❌ Грешка: " + err.message;
  }
}
</script>
