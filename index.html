<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>AIIP</title>
</head>
<body>

<h2>Качи файл</h2>

<input type="file" id="file">
<button onclick="analyze()">Анализирай</button>

<br><br>

<textarea id="output" style="width:100%; height:400px;"></textarea>

<script>
async function analyze() {
  const file = document.getElementById("file").files[0];
  const output = document.getElementById("output");

  if (!file) {
    output.value = "❌ Качи файл";
    return;
  }

  try {
    // ЧЕТЕ ВСЯКАКЪВ ФАЙЛ КАТО ТЕКСТ (най-просто)
    const text = await file.text();

    if (!text) {
      output.value = "❌ Няма текст в файла";
      return;
    }

    output.value = text;

  } catch (e) {
    output.value = "❌ Грешка: " + e.message;
  }
}
</script>

</body>
</html>
