<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>⚖️ AIIP Legal Assistant</title>
</head>
<body>

<h1>⚖️ AIIP Legal Assistant</h1>

<input type="file" id="file" accept=".pdf,.docx,.txt" />
<br><br>

<button id="analyzeBtn" type="button">Анализирай</button>

<h3>📊 Резултат:</h3>
<textarea id="output" style="width:100%; height:400px;"></textarea>

<!-- CDN -->
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  if (!window.pdfjsLib) {
    alert("❌ pdf.js не е зареден");
    return;
  }

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";

  const output = document.getElementById("output");
  const btn = document.getElementById("analyzeBtn");

  let isRunning = false;

  function show(msg) {
    output.value = msg;
  }

  // =====================
  // PDF
  // =====================
  async function extractTextFromPDF(file) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(i => i.str || "").join(" ") + "\n";
    }

    // OCR fallback
    if (text.trim().length < 20) {
      const worker = await Tesseract.createWorker();
      await worker.loadLanguage("bul+eng");
      await worker.initialize("bul+eng");

      let ocrText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 2 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext: ctx, viewport }).promise;

        const result = await worker.recognize(canvas);
        ocrText += result.data.text + "\n";
      }

      await worker.terminate();

      if (ocrText.trim().length > text.trim().length) {
        text = ocrText;
      }
    }

    return text
      .replace(/\s+/g, " ")
      .replace(/CBABT/g, "Съдът")
      .replace(/MapKa/g, "марка")
      .replace(/3HaK/g, "знак")
      .trim();
  }

  // =====================
  // WORD
  // =====================
  async function extractTextFromWord(file) {
    const buffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: buffer });
    return result.value.trim();
  }

  // =====================
  // TXT
  // =====================
  async function extractTextFromTxt(file) {
    return (await file.text()).trim();
  }

  // =====================
  // MAIN
  // =====================
  async function runNewAnalyze() {

    if (isRunning) return;

    isRunning = true;
    btn.disabled = true;

    show("🟢 Обработка...");

    try {
      const fileInput = document.getElementById("file");

      if (!fileInput.files.length) {
        show("❌ Моля качете файл.");
        return;
      }

      const file = fileInput.files[0];
      const name = file.name.toLowerCase();

      let text = "";

      if (name.endsWith(".pdf")) {
        text = await extractTextFromPDF(file);
      } else if (name.endsWith(".docx")) {
        text = await extractTextFromWord(file);
      } else if (name.endsWith(".txt")) {
        text = await extractTextFromTxt(file);
      } else {
        show("❌ Поддържат се само PDF, DOCX и TXT.");
        return;
      }

      if (!text) {
        show("❌ Няма текст.");
        return;
      }

      if (text.length > 20000) {
        text = text.slice(0, 20000);
      }

      show("🧠 AI анализ...");

      const response = await fetch("/api/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ text })
      });

      const textResponse = await response.text();

let data;

try {
  data = JSON.parse(textResponse);
} catch (e) {
  console.error("RAW RESPONSE:", textResponse);
  throw new Error("Server returned invalid response");
}

if (!response.ok) {
  throw new Error(data?.error || "AI грешка");
}

      if (!response.ok) {
        throw new Error(data?.error || "AI грешка");
      }

      show(data.result || "Няма резултат");

    } catch (err) {
      console.error(err);
      show("❌ Грешка: " + err.message);
    } finally {
      isRunning = false;
      btn.disabled = false;
    }
  }

  btn.addEventListener("click", runNewAnalyze);

  show("✅ Готово. Качи файл и натисни „Анализирай“.");

});
</script>

</body>
</html>
